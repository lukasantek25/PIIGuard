<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AnonyMe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 260px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #ebebeb;
    }

    h1 { font-size: 15px; font-weight: 600; }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #666;
    }

    .toggle { position: relative; width: 34px; height: 19px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #ccc; border-radius: 20px; cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: ""; position: absolute;
      width: 13px; height: 13px; left: 3px; top: 3px;
      background: white; border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #2563eb; }
    input:checked + .slider::before { transform: translateX(15px); }

    .rules {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .rule-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #333;
      cursor: pointer;
    }

    .rule-row input[type="checkbox"] {
      width: 15px; height: 15px; cursor: pointer;
      accent-color: #2563eb;
    }

    footer {
      padding: 10px 16px;
      border-top: 1px solid #ebebeb;
      font-size: 11px;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>🕶️ AnonyMe</h1>
    <div class="toggle-wrap">
      <span id="status-label">On</span>
      <label class="toggle">
        <input type="checkbox" id="master-toggle" checked />
        <span class="slider"></span>
      </label>
    </div>
  </header>

  <div class="rules" id="rules-section">
    <label class="rule-row">
      <input type="checkbox" id="rule-emails" checked />
      Email addresses
    </label>
  </div>

  <footer>Running locally — no data leaves your device</footer>

  <script src="popup.js"></script>
</body>
</html>
